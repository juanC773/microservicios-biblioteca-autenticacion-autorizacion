# Solo Keycloak. Los microservicios se levantan con run-all.ps1
# Keycloak 22: las variables KEYCLOAK_ADMIN crean el usuario admin al primer arranque.
#
# PRIMERA VEZ:
#   docker-compose down -v
#   docker-compose up -d
#   Esperar ~30 s y abrir http://localhost:8080/admin — usuario admin, contraseña admin
#
services:
  keycloak:
    image: quay.io/keycloak/keycloak:22.0
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: start-dev
    ports:
      - "8080:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data

volumes:
  keycloak_data:
